name: Release

# Tag a commit to cut a release:  git tag v0.2.0 && git push origin v0.2.0
# (or run this workflow by hand from the Actions tab to test the packaging).
on:
  push:
    tags: ["v*"]
  # A release drafted/published from the GitHub UI also gets its binaries.
  release:
    types: [published]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  macos:
    name: macOS (universal .app)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v7

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin, aarch64-apple-darwin

      - uses: Swatinem/rust-cache@v2

      - name: Build both architectures
        run: |
          cargo build --release -p prisme --target x86_64-apple-darwin
          cargo build --release -p prisme --target aarch64-apple-darwin

      # One binary that runs on both Apple Silicon and Intel Macs.
      - name: Merge into a universal binary
        run: |
          mkdir -p target/release
          lipo -create -output target/release/prisme \
            target/x86_64-apple-darwin/release/prisme \
            target/aarch64-apple-darwin/release/prisme
          lipo -info target/release/prisme

      # Reuses the same bundler used locally, so the CI artifact and a local
      # build are produced the exact same way.
      - name: Bundle Prisme.app
        run: SKIP_BUILD=1 ./scripts/make-app.sh

      - name: Zip the bundle
        run: ditto -c -k --keepParent dist/Prisme.app Prisme-macos-universal.zip

      - uses: actions/upload-artifact@v7
        with:
          name: macos
          path: Prisme-macos-universal.zip

  windows:
    name: Windows (x64)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --release -p prisme

      - name: Package
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path package | Out-Null
          Copy-Item target/release/prisme.exe package/
          Copy-Item README.md package/
          Compress-Archive -Path package/* -DestinationPath Prisme-windows-x64.zip

      - uses: actions/upload-artifact@v7
        with:
          name: windows
          path: Prisme-windows-x64.zip

  linux:
    name: Linux (x64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      # winit/pixels need X11+Wayland, cpal needs ALSA, rfd/muda pull in GTK3.
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            pkg-config libasound2-dev libgtk-3-dev libxkbcommon-dev \
            libwayland-dev libx11-dev libxcursor-dev libxrandr-dev libxi-dev

      - name: Build
        run: cargo build --release -p prisme

      - name: Package
        run: |
          mkdir -p package
          cp target/release/prisme package/
          cp README.md package/
          tar -czf Prisme-linux-x64.tar.gz -C package .

      - uses: actions/upload-artifact@v7
        with:
          name: linux
          path: Prisme-linux-x64.tar.gz

  release:
    name: Publish release
    needs: [macos, windows, linux]
    # Only publish for real tags; a manual run just builds the artifacts.
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v7
        with:
          merge-multiple: true

      - name: Checksums
        run: shasum -a 256 *.zip *.tar.gz | tee SHA256SUMS.txt

      - name: Attach the binaries to the release
        env:
          GH_TOKEN: ${{ github.token }}
          # On a release event the tag lives in the payload; on a tag push it is the ref.
          TAG: ${{ github.event.release.tag_name || github.ref_name }}
        run: |
          set -euo pipefail
          cat > notes.md <<'EOF'
          ## Prisme - SuperNes

          A Super Nintendo emulator written from scratch in Rust.

          | Download | Platform |
          |---|---|
          | `Prisme-macos-universal.zip` | macOS 10.13+ (Apple Silicon and Intel) |
          | `Prisme-windows-x64.zip` | Windows x64 |
          | `Prisme-linux-x64.tar.gz` | Linux x64 (glibc) |

          **macOS:** the app is **not signed or notarised** (that needs a paid Apple
          Developer account), so Gatekeeper will refuse the first launch. Either
          right-click the app and choose *Open*, or run:
          `xattr -dr com.apple.quarantine Prisme.app`

          **Windows:** unpack and run `prisme.exe`. The native menu bar is macOS-only;
          on Windows use the keyboard shortcuts documented in the README.

          **Linux:** unpack and run `./prisme`. Needs ALSA, GTK3 and X11/Wayland
          runtime libraries (present on most desktop installs); on Debian/Ubuntu:
          `sudo apt install libasound2 libgtk-3-0 libxkbcommon0`. The menu bar is
          macOS-only here too, so use the keyboard shortcuts.

          **ROMs are not included** — supply your own dumps of games you own.
          EOF
          ASSETS=(Prisme-macos-universal.zip Prisme-windows-x64.zip Prisme-linux-x64.tar.gz SHA256SUMS.txt)
          if gh release view "$TAG" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            # Release already exists (drafted in the UI): just attach/replace assets.
            gh release upload "$TAG" "${ASSETS[@]}" \
              --repo "${{ github.repository }}" --clobber
          else
            gh release create "$TAG" \
              --repo "${{ github.repository }}" \
              --title "Prisme - SuperNes $TAG" \
              --notes-file notes.md \
              "${ASSETS[@]}"
          fi
